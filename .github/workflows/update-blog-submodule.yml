name: Update submodule in main blog

on:
  push:
    branches:
      - main # Trigger on commits to main

jobs:
  update-submodule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout compendium
        uses: actions/checkout@v4

      - name: Checkout wisphill.github.io repo
        run: |
          git clone --recurse-submodules https://github.com/wisphill/wisphill.github.io.git
          cd blog
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git submodule update --remote --merge

      - name: Commit and Push Submodule Update
        run: |
          cd wisphill.github.io
          git add compendium
          git commit -m "Auto-update submodule reference to latest commit" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.BLOG_PAT }}@github.com/wisphill/wisphill.github.io.git main
